<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover"/>
  <meta name="apple-mobile-web-app-capable" content="yes"/>
  <meta name="apple-mobile-web-app-status-bar-style" content="default"/>
  <meta name="apple-mobile-web-app-title" content="EMI Calc"/>
  <meta name="theme-color" content="#eef0fb"/>
  <title>Loan EMI Calculator</title>
  <link rel="manifest" href="manifest.json"/>
  <link rel="preconnect" href="https://fonts.googleapis.com"/>
  <link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;500;600;700;800;900&display=swap" rel="stylesheet"/>

  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg: #eef0fb;
      --white: #ffffff;
      --border: #e2e4f3;
      --navy: #1a1d3b;
      --purple: #7c5cbf;
      --purple-light: #ede8f8;
      --blue-light: #dff3fc;
      --blue-border: rgba(77,184,232,0.25);
      --pink: #e84db8;
      --muted: #8b90b0;
      --radius: 20px;
      --shadow: 0 4px 20px rgba(100,100,180,0.10);
      --shadow-sm: 0 2px 10px rgba(100,100,180,0.08);
    }

    html, body {
      min-height: 100%;
      font-family: 'Nunito', sans-serif;
      background: var(--bg);
      color: var(--navy);
      -webkit-font-smoothing: antialiased;
    }

    .app {
      width: 100%;
      max-width: 430px;
      margin: 0 auto;
      padding: env(safe-area-inset-top, 0px) 0 calc(env(safe-area-inset-bottom, 0px) + 28px);
    }

    /* ── Top bar ── */
    .topbar {
      display: flex; align-items: center; justify-content: space-between;
      padding: 52px 22px 0;
    }
    .hamburger { display: flex; flex-direction: column; gap: 5px; cursor: pointer; }
    .hamburger span { display: block; width: 22px; height: 2.5px; background: var(--navy); border-radius: 2px; }
    .hamburger span:last-child { width: 15px; }

    .currency-pill {
      display: flex; align-items: center; gap: 6px;
      background: var(--white); border: 1.5px solid var(--border);
      border-radius: 100px; padding: 7px 14px;
      font-size: 13px; font-weight: 700; color: var(--navy);
      cursor: pointer; box-shadow: var(--shadow-sm); user-select: none;
    }
    .currency-pill .chev { font-size: 9px; color: var(--muted); margin-left: 2px; }

    /* ── Page title ── */
    .heading { padding: 18px 22px 0; }
    .heading p { font-size: 27px; font-weight: 400; color: var(--navy); line-height: 1.2; }
    .heading h1 { font-size: 33px; font-weight: 900; color: var(--navy); line-height: 1.1; }

    /* ── EMI Result Banner ── */
    .emi-banner {
      margin: 18px 16px 0;
      background: var(--blue-light);
      border: 1.5px solid var(--blue-border);
      border-radius: var(--radius);
      padding: 20px 22px;
      display: flex;
      align-items: center;
      justify-content: space-between;
    }
    .emi-left {}
    .emi-label { font-size: 13px; font-weight: 600; color: var(--muted); margin-bottom: 4px; }
    .emi-value {
      font-size: 40px; font-weight: 900; color: var(--navy);
      letter-spacing: -0.02em; line-height: 1;
      transition: opacity 0.15s;
    }
    .emi-value .esym { font-size: 30px; margin-right: 3px; }
    .emi-icon { font-size: 52px; line-height: 1; }

    /* ── Loan type ── */
    .lt-label { padding: 20px 22px 10px; font-size: 15px; font-weight: 800; color: var(--navy); }
    .lt-row {
      display: flex; gap: 11px; padding: 0 22px 4px;
      overflow-x: auto; scrollbar-width: none;
    }
    .lt-row::-webkit-scrollbar { display: none; }

    .lt-card {
      flex-shrink: 0; width: 92px;
      background: var(--white); border: 2px solid transparent;
      border-radius: var(--radius); padding: 13px 8px 11px;
      text-align: center; cursor: pointer;
      transition: all 0.18s; box-shadow: var(--shadow-sm);
      position: relative;
    }
    .lt-card .lt-ico { font-size: 32px; display: block; margin-bottom: 6px; }
    .lt-card .lt-nm  { font-size: 13px; font-weight: 700; color: var(--navy); }
    .lt-card.active  { border-color: var(--purple); background: var(--purple-light); }
    .lt-card.active .lt-nm { color: var(--purple); }
    .lt-chk {
      position: absolute; top: 7px; right: 7px;
      width: 18px; height: 18px; background: var(--navy);
      border-radius: 50%; display: none;
      align-items: center; justify-content: center;
      font-size: 9px; color: white; font-weight: 900;
    }
    .lt-card.active .lt-chk { display: flex; }

    /* ── Fields ── */
    .fields { padding: 16px 22px 0; }
    .frow { margin-bottom: 20px; }
    .ftop {
      display: flex; align-items: center;
      justify-content: space-between; margin-bottom: 10px;
    }
    .flbl { font-size: 14px; font-weight: 700; color: var(--navy); }

    .fbox {
      display: flex; align-items: center;
      background: var(--white); border: 1.5px solid var(--border);
      border-radius: 12px; padding: 8px 12px; gap: 5px;
      box-shadow: var(--shadow-sm);
    }
    .fbox .fsym { font-size: 14px; font-weight: 700; color: var(--muted); white-space: nowrap; }
    .fbox input[type="number"] {
      border: none; outline: none;
      font-family: 'Nunito', sans-serif;
      font-size: 14px; font-weight: 700; color: var(--navy);
      background: transparent; width: 80px; text-align: right;
      -moz-appearance: textfield;
    }
    .fbox input::-webkit-inner-spin-button,
    .fbox input::-webkit-outer-spin-button { display: none; }

    /* Tenure toggle */
    .ten-right { display: flex; align-items: center; gap: 8px; }
    .unit-toggle {
      display: flex; background: var(--border);
      border-radius: 10px; padding: 3px;
    }
    .ubtn {
      padding: 4px 10px; font-size: 12px; font-weight: 800;
      color: var(--muted); background: transparent;
      border: none; border-radius: 8px; cursor: pointer;
      font-family: 'Nunito', sans-serif; transition: all 0.18s;
    }
    .ubtn.active { background: var(--white); color: var(--purple); box-shadow: var(--shadow-sm); }

    /* Slider */
    input[type="range"] {
      -webkit-appearance: none; width: 100%; height: 5px;
      border-radius: 99px; outline: none; cursor: pointer;
    }
    input[type="range"]::-webkit-slider-thumb {
      -webkit-appearance: none; width: 22px; height: 22px;
      border-radius: 50%; background: var(--white);
      border: 2.5px solid var(--purple);
      box-shadow: 0 2px 8px rgba(124,92,191,0.28); cursor: pointer;
    }
    input[type="range"]::-moz-range-thumb {
      width: 22px; height: 22px; border-radius: 50%;
      background: var(--white); border: 2.5px solid var(--purple); cursor: pointer;
    }

    /* ── Breakdown ── */
    .breakdown {
      margin: 8px 16px 0;
      background: var(--white);
      border-radius: var(--radius);
      padding: 18px 20px;
      box-shadow: var(--shadow);
    }
    .bk-title { font-size: 14px; font-weight: 800; color: var(--navy); margin-bottom: 14px; }
    .bk-donut-row {
      display: flex; align-items: center; gap: 20px;
    }
    .bk-donut { flex-shrink: 0; position: relative; width: 120px; height: 120px; }
    .bk-donut svg { width: 120px; height: 120px; }
    .bk-center {
      position: absolute; inset: 0;
      display: flex; flex-direction: column;
      align-items: center; justify-content: center;
    }
    .bk-c-lbl { font-size: 10px; color: var(--muted); font-weight: 700; }
    .bk-c-val { font-size: 12px; font-weight: 900; color: var(--navy); }

    .bk-legend { flex: 1; }
    .bk-leg-item {
      display: flex; align-items: center;
      justify-content: space-between;
      margin-bottom: 10px;
    }
    .bk-leg-item:last-child { margin-bottom: 0; }
    .bk-leg-left { display: flex; align-items: center; gap: 8px; }
    .bk-dot { width: 9px; height: 9px; border-radius: 50%; flex-shrink: 0; }
    .bk-leg-name { font-size: 12px; color: var(--muted); font-weight: 600; }
    .bk-leg-val { font-size: 13px; font-weight: 800; color: var(--navy); }

    /* ── Year Breakup accordion ── */
    .yr-accordion {
      margin: 10px 16px 0;
      background: var(--white);
      border-radius: var(--radius);
      overflow: hidden;
      box-shadow: var(--shadow);
    }
    .yr-hdr {
      display: flex; align-items: center; justify-content: space-between;
      padding: 16px 20px; cursor: pointer; user-select: none;
    }
    .yr-hdr span { font-size: 14px; font-weight: 800; color: var(--navy); }
    .yr-chev { font-size: 13px; color: var(--muted); transition: transform 0.3s; }
    .yr-accordion.open .yr-chev { transform: rotate(180deg); }
    .yr-body { display: none; }
    .yr-accordion.open .yr-body { display: block; }

    .yr-tbl { width: 100%; border-collapse: collapse; }
    .yr-tbl th {
      font-size: 11px; font-weight: 700; color: var(--muted);
      text-transform: uppercase; letter-spacing: 0.06em;
      padding: 8px 16px; text-align: right;
      background: var(--bg); border-top: 1px solid var(--border);
    }
    .yr-tbl th:first-child { text-align: left; }
    .yr-tbl td {
      font-size: 12px; font-weight: 700; padding: 10px 16px;
      text-align: right; border-top: 1px solid var(--border); color: var(--navy);
    }
    .yr-tbl td:first-child { text-align: left; color: var(--muted); font-size: 12px; }
    .yr-tbl td.cp { color: var(--purple); }
    .yr-tbl td.ci { color: var(--pink); }

    /* pulse on recalc */
    @keyframes pulse {
      0%   { opacity: 1; }
      40%  { opacity: 0.4; }
      100% { opacity: 1; }
    }
    .recalc { animation: pulse 0.3s ease; }

    @keyframes fadeUp {
      from { opacity: 0; transform: translateY(10px); }
      to   { opacity: 1; transform: translateY(0); }
    }
    .emi-banner   { animation: fadeUp 0.35s ease both; }
    .lt-label     { animation: fadeUp 0.35s 0.05s ease both; }
    .lt-row       { animation: fadeUp 0.35s 0.08s ease both; }
    .fields       { animation: fadeUp 0.35s 0.11s ease both; }
    .breakdown    { animation: fadeUp 0.35s 0.16s ease both; }
    .yr-accordion { animation: fadeUp 0.35s 0.2s ease both; }
  </style>
</head>
<body>
<div class="app">

  <!-- Top bar -->
  <div class="topbar">
    <div class="hamburger"><span></span><span></span><span></span></div>
    <div class="currency-pill" onclick="cycleCurrency()">
      <span id="flagEl">🇮🇳</span>
      <span id="currLabel">INR</span>
      <span class="chev">▼</span>
    </div>
  </div>

  <!-- Heading -->
  <div class="heading">
    <p>Loan EMI</p>
    <h1>Calculator</h1>
  </div>

  <!-- ★ EMI Result Banner (always visible) -->
  <div class="emi-banner">
    <div class="emi-left">
      <div class="emi-label">EMI per month</div>
      <div class="emi-value" id="emiVal">
        <span class="esym" id="emiSym">₹</span><span id="emiNum">7,753</span>
      </div>
    </div>
    <div class="emi-icon" id="emiIcon">🏠</div>
  </div>

  <!-- Loan Type -->
  <div class="lt-label">Select loan type</div>
  <div class="lt-row">
    <div class="lt-card active" onclick="pickLoan(this,'🏠')">
      <span class="lt-ico">🏠</span><div class="lt-nm">Home</div><div class="lt-chk">✓</div>
    </div>
    <div class="lt-card" onclick="pickLoan(this,'🚗')">
      <span class="lt-ico">🚗</span><div class="lt-nm">Vehicle</div><div class="lt-chk">✓</div>
    </div>
    <div class="lt-card" onclick="pickLoan(this,'💼')">
      <span class="lt-ico">💼</span><div class="lt-nm">Personal</div><div class="lt-chk">✓</div>
    </div>
    <div class="lt-card" onclick="pickLoan(this,'🎓')">
      <span class="lt-ico">🎓</span><div class="lt-nm">Education</div><div class="lt-chk">✓</div>
    </div>
  </div>

  <!-- Fields -->
  <div class="fields">

    <!-- Loan Amount -->
    <div class="frow">
      <div class="ftop">
        <label class="flbl">Loan Amount</label>
        <div class="fbox">
          <span class="fsym" id="sym1">₹</span>
          <input type="number" id="amtIn" value="800000" min="10000" max="100000000" step="10000"
            oninput="onIn('amt')" onchange="clamp('amt')"/>
        </div>
      </div>
      <input type="range" id="amtRng" min="10000" max="10000000" step="10000" value="800000"
        oninput="onRng('amt')"/>
    </div>

    <!-- Down Payment -->
    <div class="frow">
      <div class="ftop">
        <label class="flbl">Down Payment</label>
        <div class="fbox">
          <span class="fsym" id="sym2">₹</span>
          <input type="number" id="downIn" value="100000" min="0" max="10000000" step="10000"
            oninput="onIn('down')" onchange="clamp('down')"/>
        </div>
      </div>
      <input type="range" id="downRng" min="0" max="5000000" step="10000" value="100000"
        oninput="onRng('down')"/>
    </div>

    <!-- Tenure -->
    <div class="frow">
      <div class="ftop">
        <label class="flbl">Tenure</label>
        <div class="ten-right">
          <div class="fbox">
            <input type="number" id="tenIn" value="12" min="1" max="360" step="1"
              oninput="onIn('ten')" onchange="clamp('ten')"/>
            <span class="fsym" id="tenUnitLbl" style="color:var(--purple);font-size:12px">Mo</span>
          </div>
          <div class="unit-toggle">
            <button class="ubtn active" id="btnMo" onclick="setUnit('months')">Mo</button>
            <button class="ubtn"        id="btnYr"  onclick="setUnit('years')">Yr</button>
          </div>
        </div>
      </div>
      <input type="range" id="tenRng" min="1" max="360" step="1" value="12" oninput="onRng('ten')"/>
    </div>

    <!-- Interest Rate -->
    <div class="frow">
      <div class="ftop">
        <label class="flbl">Interest Rate</label>
        <div class="fbox">
          <input type="number" id="rateIn" value="8.5" min="0.1" max="30" step="0.1"
            oninput="onIn('rate')" onchange="clamp('rate')"/>
          <span class="fsym">%</span>
        </div>
      </div>
      <input type="range" id="rateRng" min="0.1" max="30" step="0.1" value="8.5"
        oninput="onRng('rate')"/>
    </div>

  </div>

  <!-- Breakdown card with donut -->
  <div class="breakdown">
    <div class="bk-title">Payment Breakdown</div>
    <div class="bk-donut-row">
      <div class="bk-donut">
        <svg viewBox="0 0 120 120">
          <circle cx="60" cy="60" r="44" fill="none" stroke="#eeeef8" stroke-width="18"/>
          <circle id="dP" cx="60" cy="60" r="44" fill="none" stroke="#7c5cbf" stroke-width="18"
            stroke-dasharray="0 277" transform="rotate(-90 60 60)"
            style="transition:stroke-dasharray 0.5s cubic-bezier(0.4,0,0.2,1)"/>
          <circle id="dI" cx="60" cy="60" r="44" fill="none" stroke="#e84db8" stroke-width="18"
            stroke-dasharray="0 277" transform="rotate(-90 60 60)"
            style="transition:stroke-dasharray 0.5s cubic-bezier(0.4,0,0.2,1)"/>
          <circle id="dD" cx="60" cy="60" r="44" fill="none" stroke="#4db8e8" stroke-width="18"
            stroke-dasharray="0 277" transform="rotate(-90 60 60)"
            style="transition:stroke-dasharray 0.5s cubic-bezier(0.4,0,0.2,1)"/>
        </svg>
        <div class="bk-center">
          <div class="bk-c-lbl">Total</div>
          <div class="bk-c-val" id="dCenter">—</div>
        </div>
      </div>
      <div class="bk-legend">
        <div class="bk-leg-item">
          <div class="bk-leg-left">
            <div class="bk-dot" style="background:#7c5cbf"></div>
            <span class="bk-leg-name">Principal</span>
          </div>
          <span class="bk-leg-val" id="lgP">—</span>
        </div>
        <div class="bk-leg-item">
          <div class="bk-leg-left">
            <div class="bk-dot" style="background:#e84db8"></div>
            <span class="bk-leg-name">Interest</span>
          </div>
          <span class="bk-leg-val" id="lgI">—</span>
        </div>
        <div class="bk-leg-item">
          <div class="bk-leg-left">
            <div class="bk-dot" style="background:#4db8e8"></div>
            <span class="bk-leg-name">Total Paid</span>
          </div>
          <span class="bk-leg-val" id="lgT">—</span>
        </div>
      </div>
    </div>
  </div>

  <!-- Year Breakup -->
  <div class="yr-accordion" id="yrAcc">
    <div class="yr-hdr" onclick="toggleYr()">
      <span>View Year Breakup</span>
      <span class="yr-chev">▼</span>
    </div>
    <div class="yr-body">
      <table class="yr-tbl">
        <thead>
          <tr><th>Year</th><th>Principal</th><th>Interest</th><th>Balance</th></tr>
        </thead>
        <tbody id="yrBody"></tbody>
      </table>
    </div>
  </div>

</div><!-- /app -->

<script>
  const CURRENCIES = [
    {flag:'🇮🇳', label:'INR', sym:'₹'},
    {flag:'🇺🇸', label:'USD', sym:'$'},
    {flag:'🇬🇧', label:'GBP', sym:'£'},
    {flag:'🇪🇺', label:'EUR', sym:'€'},
  ];
  let curIdx = 0;
  let loanIcon = '🏠';
  let tenUnit = 'months';

  const sym = () => CURRENCIES[curIdx].sym;

  function cycleCurrency() {
    curIdx = (curIdx + 1) % CURRENCIES.length;
    document.getElementById('flagEl').textContent = CURRENCIES[curIdx].flag;
    document.getElementById('currLabel').textContent = CURRENCIES[curIdx].label;
    document.getElementById('sym1').textContent = sym();
    document.getElementById('sym2').textContent = sym();
    document.getElementById('emiSym').textContent = sym();
    recalc();
  }

  function pickLoan(el, icon) {
    document.querySelectorAll('.lt-card').forEach(c => c.classList.remove('active'));
    el.classList.add('active');
    loanIcon = icon;
    document.getElementById('emiIcon').textContent = icon;
  }

  function setUnit(u) {
    tenUnit = u;
    const inp = document.getElementById('tenIn');
    const rng = document.getElementById('tenRng');
    const cur = parseInt(inp.value) || 1;
    if (u === 'months') {
      document.getElementById('btnMo').classList.add('active');
      document.getElementById('btnYr').classList.remove('active');
      document.getElementById('tenUnitLbl').textContent = 'Mo';
      rng.max = 360; rng.step = 1;
      const v = Math.min(cur * 12, 360);
      inp.value = v; rng.value = v;
    } else {
      document.getElementById('btnYr').classList.add('active');
      document.getElementById('btnMo').classList.remove('active');
      document.getElementById('tenUnitLbl').textContent = 'Yr';
      rng.max = 30; rng.step = 1;
      const v = Math.max(1, Math.round(cur / 12));
      inp.value = v; rng.value = v;
    }
    grad('ten'); recalc();
  }

  // Slider ↔ input sync
  function onRng(f) {
    document.getElementById(f+'In').value = document.getElementById(f+'Rng').value;
    grad(f); recalc();
  }
  function onIn(f) {
    const inp = document.getElementById(f+'In');
    const rng = document.getElementById(f+'Rng');
    const v = parseFloat(inp.value);
    if (!isNaN(v)) {
      const clamped = Math.min(Math.max(v, parseFloat(rng.min)), parseFloat(rng.max));
      rng.value = clamped;
    }
    grad(f); recalc();
  }
  function clamp(f) {
    const inp = document.getElementById(f+'In');
    const rng = document.getElementById(f+'Rng');
    let v = parseFloat(inp.value);
    if (isNaN(v)) v = parseFloat(rng.min);
    v = Math.min(Math.max(v, parseFloat(rng.min)), parseFloat(rng.max));
    inp.value = v; rng.value = v;
    grad(f); recalc();
  }
  function grad(f) {
    const el = document.getElementById(f+'Rng');
    const pct = ((el.value - el.min) / (el.max - el.min)) * 100;
    el.style.background = `linear-gradient(to right,#7c5cbf 0%,#7c5cbf ${pct}%,#e2e4f3 ${pct}%,#e2e4f3 100%)`;
  }

  // EMI formula
  function calcEMI(P, annRate, months) {
    const r = annRate / 12 / 100;
    if (r === 0) return P / months;
    return P * r * Math.pow(1+r, months) / (Math.pow(1+r, months) - 1);
  }
  function fmt(n)  { return new Intl.NumberFormat('en-IN',{maximumFractionDigits:0}).format(Math.round(n)); }
  function fmtS(n) {
    if (n>=10000000) return (n/10000000).toFixed(1)+'Cr';
    if (n>=100000)   return (n/100000).toFixed(1)+'L';
    if (n>=1000)     return (n/1000).toFixed(1)+'K';
    return Math.round(n).toString();
  }

  function recalc() {
    const loanAmt = parseFloat(document.getElementById('amtIn').value)  || 0;
    const downAmt = parseFloat(document.getElementById('downIn').value) || 0;
    const tenRaw  = parseFloat(document.getElementById('tenIn').value)  || 1;
    const rate    = parseFloat(document.getElementById('rateIn').value) || 0;

    const months  = tenUnit === 'months' ? tenRaw : tenRaw * 12;
    const P       = Math.max(loanAmt - downAmt, 0);
    const monthly = calcEMI(P, rate, months);
    const totalPaid = monthly * months;
    const interest  = totalPaid - P;
    const grand     = totalPaid + downAmt;
    const s = sym();

    // EMI banner
    const emiEl = document.getElementById('emiNum');
    emiEl.textContent = fmt(monthly);
    emiEl.classList.remove('recalc');
    void emiEl.offsetWidth;
    emiEl.classList.add('recalc');

    // Donut (r=44, circ≈276.5)
    const C = 2 * Math.PI * 44;
    const total = P + interest + downAmt;
    const safeTotal = total || 1;
    const pSlice = (P / safeTotal) * C;
    const iSlice = (interest / safeTotal) * C;
    const dSlice = (downAmt / safeTotal) * C;

    const dp = document.getElementById('dP');
    const di = document.getElementById('dI');
    const dd = document.getElementById('dD');
    dp.setAttribute('stroke-dasharray', `${pSlice} ${C - pSlice}`);
    dp.style.strokeDashoffset = 0;
    di.setAttribute('stroke-dasharray', `${iSlice} ${C - iSlice}`);
    di.style.strokeDashoffset = -pSlice;
    dd.setAttribute('stroke-dasharray', `${dSlice} ${C - dSlice}`);
    dd.style.strokeDashoffset = -(pSlice + iSlice);

    document.getElementById('dCenter').textContent = s + fmtS(grand);
    document.getElementById('lgP').textContent = s + fmt(P);
    document.getElementById('lgI').textContent = s + fmt(interest);
    document.getElementById('lgT').textContent = s + fmt(grand);

    // Year table
    buildTable(P, rate, months, monthly);
  }

  function buildTable(P, annRate, totalMonths, monthly) {
    const r = annRate / 12 / 100;
    let bal = P;
    const tbody = document.getElementById('yrBody');
    tbody.innerHTML = '';
    const years = Math.ceil(totalMonths / 12);
    const s = sym();
    for (let y = 1; y <= years; y++) {
      let yP = 0, yI = 0;
      const mo = Math.min(12, totalMonths - (y-1)*12);
      for (let m = 0; m < mo; m++) {
        if (bal <= 0) break;
        const iAmt = bal * r;
        const pAmt = Math.min(monthly - iAmt, bal);
        yI += iAmt; yP += pAmt; bal -= pAmt;
      }
      const tr = document.createElement('tr');
      tr.innerHTML = `<td>Yr ${y}</td><td class="cp">${s}${fmt(yP)}</td><td class="ci">${s}${fmt(yI)}</td><td>${s}${fmt(Math.max(bal,0))}</td>`;
      tbody.appendChild(tr);
    }
  }

  function toggleYr() {
    document.getElementById('yrAcc').classList.toggle('open');
  }

  // Boot
  document.getElementById('sym1').textContent = sym();
  document.getElementById('sym2').textContent = sym();
  document.getElementById('emiSym').textContent = sym();
  ['amt','down','ten','rate'].forEach(f => grad(f));
  recalc();

  if ('serviceWorker' in navigator) {
    window.addEventListener('load', () => navigator.serviceWorker.register('./sw.js').catch(()=>{}));
  }
</script>
</body>
</html>
